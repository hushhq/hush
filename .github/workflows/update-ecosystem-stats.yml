name: Update ecosystem stats

on:
  schedule:
    # Once a day, just after midnight UTC. The GitHub stargazers count
    # does not move fast enough to need anything tighter, and a daily
    # cadence keeps the commit log readable.
    - cron: '17 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-ecosystem-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run script unit tests
        run: node --test scripts/__tests__/update-ecosystem-stats.test.mjs

      - name: Refresh README stats block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-ecosystem-stats.mjs

      - name: Open pull request if README changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_BRANCH: automation/ecosystem-stats
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "README ecosystem-stats block already up to date."
            exit 0
          fi
          git config user.name "hush-bot"
          git config user.email "hush-bot@users.noreply.github.com"
          git add README.md
          git commit -m "chore(stats): refresh ecosystem stars block"
          git push --force-with-lease origin "HEAD:${STATS_BRANCH}"
          if gh pr list --head "${STATS_BRANCH}" --state open --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "Ecosystem stats pull request already open."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "${STATS_BRANCH}" \
            --title "chore(stats): refresh ecosystem stars block" \
            --body "Automated update of the README ecosystem stars block."
